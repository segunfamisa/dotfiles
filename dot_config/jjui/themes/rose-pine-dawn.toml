# Rosé Pine Dawn (light) theme for jjui — matches Ghostty "Rose Pine Dawn".
# Palette:
#   base #faf4ed  surface #fffaf3  overlay #f2e9e1
#   muted #9893a5 subtle #797593   text #575279
#   love #b4637a  gold #ea9d34     rose #d7827e
#   pine #286983  foam #56949f     iris #907aa9
#   hl_low #f4ede8 hl_med #dfdad9  hl_high #cecacd

# --- Base / shared ---
text = "#575279"
dimmed = "#9893a5"
title = { fg = "#907aa9", bold = true }
shortcut = "#907aa9"
matched = "#56949f"
selected = { bg = "#dfdad9" }
target_marker = { fg = "#faf4ed", bg = "#b4637a", bold = true }
source_marker = { fg = "#faf4ed", bg = "#56949f" }
success = "#56949f"
error = "#b4637a"
border = "#cecacd"

# --- Flash / confirmation ---
"flash selected" = "#56949f"
"confirmation text" = { fg = "#907aa9", bold = true }
"confirmation selected" = { fg = "#faf4ed", bg = "#286983", bold = true }
"confirmation dimmed" = "#797593"

# --- Help ---
"help title" = { fg = "#56949f", bold = true }

# --- Revisions ---
"revisions details selected" = { bg = "#dfdad9", bold = true }
"revisions details selected dimmed" = { fg = "#286983" }
"revisions details dimmed" = "#9893a5"
"revisions matched" = { underline = false, reverse = true }

# --- Op log ---
"oplog matched" = { underline = false, reverse = true }

# --- Revset prompt + completion ---
"revset title" = "#907aa9"
"revset text" = { fg = "#56949f", bold = true }
"revset completion" = { bg = "#fffaf3" }
"revset completion dimmed" = { fg = "#9893a5" }
"revset completion text" = { fg = "#56949f" }
"revset completion matched" = { fg = "#56949f", underline = true, bold = true }
"revset completion selected" = { bg = "#dfdad9", bold = true }
"revset completion selected dimmed" = { fg = "#286983" }
"revset completion selected text" = { fg = "#907aa9" }
"revset completion selected matched" = { underline = true, bold = true }

# --- Status bar ---
"status title" = { fg = "#faf4ed", bg = "#907aa9", bold = true }

# --- Menu ---
"menu title" = { fg = "#faf4ed", bg = "#907aa9", bold = true }
"menu subtitle" = { fg = "#907aa9", bold = true }
"menu matched" = { fg = "#907aa9", bold = true }
"menu selected" = { fg = "#286983", bold = true, underline = false }
"menu selected shortcut" = { bg = "default" }

# --- Picker ---
"picker dimmed" = { fg = "#9893a5" }
"picker matched" = { underline = true }
"picker selected" = { fg = "#286983", bg = "#dfdad9", bold = true, underline = false }
"picker selected dimmed" = {}
"picker selected text" = {}
"picker selected matched" = {}
