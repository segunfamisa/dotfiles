# Rosé Pine (dark) theme for jjui — matches Ghostty "Rose Pine".
# Palette:
#   base #191724  surface #1f1d2e  overlay #26233a
#   muted #6e6a86 subtle #908caa  text #e0def4
#   love #eb6f92  gold #f6c177    rose #ebbcba
#   pine #31748f  foam #9ccfd8    iris #c4a7e7
#   hl_low #21202e hl_med #403d52 hl_high #524f67

# --- Base / shared ---
text = "#e0def4"
dimmed = "#6e6a86"
title = { fg = "#c4a7e7", bold = true }
shortcut = "#c4a7e7"
matched = "#9ccfd8"
selected = { bg = "#26233a" }
target_marker = { fg = "#191724", bg = "#eb6f92", bold = true }
source_marker = { fg = "#191724", bg = "#9ccfd8" }
success = "#9ccfd8"
error = "#eb6f92"
border = "#403d52"

# --- Flash / confirmation ---
"flash selected" = "#9ccfd8"
"confirmation text" = { fg = "#c4a7e7", bold = true }
"confirmation selected" = { fg = "#e0def4", bg = "#31748f", bold = true }
"confirmation dimmed" = "#908caa"

# --- Help ---
"help title" = { fg = "#9ccfd8", bold = true }

# --- Revisions ---
"revisions details selected" = { bg = "#26233a", bold = true }
"revisions details selected dimmed" = { fg = "#9ccfd8" }
"revisions details dimmed" = "#6e6a86"
"revisions matched" = { underline = false, reverse = true }

# --- Op log ---
"oplog matched" = { underline = false, reverse = true }

# --- Revset prompt + completion ---
"revset title" = "#c4a7e7"
"revset text" = { fg = "#9ccfd8", bold = true }
"revset completion" = { bg = "#1f1d2e" }
"revset completion dimmed" = { fg = "#6e6a86" }
"revset completion text" = { fg = "#9ccfd8" }
"revset completion matched" = { fg = "#9ccfd8", underline = true, bold = true }
"revset completion selected" = { bg = "#26233a", bold = true }
"revset completion selected dimmed" = { fg = "#9ccfd8" }
"revset completion selected text" = { fg = "#c4a7e7" }
"revset completion selected matched" = { underline = true, bold = true }

# --- Status bar ---
"status title" = { fg = "#191724", bg = "#c4a7e7", bold = true }

# --- Menu ---
"menu title" = { fg = "#191724", bg = "#c4a7e7", bold = true }
"menu subtitle" = { fg = "#c4a7e7", bold = true }
"menu matched" = { fg = "#c4a7e7", bold = true }
"menu selected" = { fg = "#9ccfd8", bold = true, underline = false }
"menu selected shortcut" = { bg = "default" }

# --- Picker ---
"picker dimmed" = { fg = "#6e6a86" }
"picker matched" = { underline = true }
"picker selected" = { fg = "#9ccfd8", bg = "#26233a", bold = true, underline = false }
"picker selected dimmed" = {}
"picker selected text" = {}
"picker selected matched" = {}
